<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NYSC Task Portal</title>

    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <div class="logo">
            🏛️
        </div>

        <h1>NYSC Task Portal</h1>
        <p class="subtitle">Sign in to manage organizational tasks</p>

        <form id="loginForm">
            <label>Username</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <button type="submit">Login System</button>
        </form>

        <p id="message" class="message"></p>

    </div>
</div>

<script src="assets/js/auth.js"></script>

<script>
redirectIfLoggedIn();

const form = document.getElementById("loginForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    message.textContent = "Logging in...";

    try {
        const res = await fetch("/TMS/nysc-task-management-system/backend/routes/api.php/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.status !== "success") {
            message.textContent = data.message;
            return;
        }

        localStorage.setItem("user", JSON.stringify(data.user));

        window.location.replace("dashboard.html");

    } catch (err) {
        message.textContent = "Server error";
    }
});
</script>

</body>
</html>
