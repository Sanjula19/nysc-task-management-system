<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">NYSC TMS</h2>

        <ul class="menu">
            <li class="active">Dashboard</li>
            <li onclick="goTasks()">All Tasks</li>
            <li onclick="goCreate()">Create Task</li>
            <li onclick="goProfile()">Profile</li>
        </ul>

        <div class="user">
            <p id="userName"></p>
            <button onclick="logout()">Logout</button>
        </div>
    </aside>

    <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h1>Dashboard</h1>
        <div class="top-right">
            🔔
            <span class="date">24 April 2026</span>
        </div>
    </div>

    <!-- STATS -->
    <div class="content-grid">

        <!-- LEFT -->
        <div class="left">

            <div class="stats">

                <div class="card">
                    <div class="icon blue">📋</div>
                    <div>
                        <p>Total Tasks</p>
                        <h2 id="total">0</h2>
                    </div>
                </div>

                <div class="card">
                    <div class="icon yellow">⏱</div>
                    <div>
                        <p>Pending</p>
                        <h2 id="pending">0</h2>
                    </div>
                </div>

                <div class="card">
                    <div class="icon purple">🔄</div>
                    <div>
                        <p>In Progress</p>
                        <h2 id="progress">0</h2>
                    </div>
                </div>

                <div class="card">
                    <div class="icon green">✅</div>
                    <div>
                        <p>Completed</p>
                        <h2 id="completed">0</h2>
                    </div>
                </div>

            </div>

            <!-- TABLE -->
            <div class="table-section">
                <div class="table-header">
                    <h3>Recently Created Tasks</h3>
                    <span onclick="goTasks()">View All</span>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Task Detail</th>
                            <th>Status</th>
                            <th>Deadline</th>
                        </tr>
                    </thead>
                    <tbody id="taskBody"></tbody>
                </table>
            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="right">

            <div class="widget">
                <button onclick="goCreate()">+ New Task</button>
            </div>

            <div class="widget">
                <h4>Top Assistant Directors</h4>
                <p>No data yet</p>
            </div>

        </div>

    </div>

</main>
</div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/dashboard.js"></script>

</body>
</html>
